<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서부 NPS 현황 대시보드</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B3A5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NPS 현황">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231B3A5C'/><text y='.9em' x='50' text-anchor='middle' font-size='60'>📊</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="data.js"></script>

<style>
:root{--primary:#1B3A5C;--primary-light:#2C5F8A;--accent:#E8531E;--success:#1A8A4A;--danger:#D32F2F;--warning:#F57C00;--bg:#F4F6F9;--card:#FFF;--border:#DDE3EA;--text:#1E2A3A;--text-secondary:#5A6B7F;--text-muted:#8899AA;--shadow:0 2px 12px rgba(27,58,92,.08);--radius:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard','Noto Sans KR','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');



/* ── Header ── */
.header{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:700;display:flex;align-items:center;gap:10px}
.header h1 .badge{background:rgba(255,255,255,.2);padding:2px 10px;border-radius:20px;font-size:11px;font-weight:500}
.sync-indicator{font-size:11px;padding:3px 10px;border-radius:12px;background:rgba(255,255,255,.15);display:none}

.container{max-width:1440px;margin:0 auto;padding:20px}
.hidden{display:none!important}

/* ── Cards ── */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:16px}
.card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:14px;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:8px}
.card-body{padding:20px}

/* ── Buttons ── */
.btn{padding:8px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-light)}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#b71c1c}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{background:#15703c}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{background:#f0f2f5}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-publish{background:linear-gradient(135deg,var(--accent),#FF6B35);color:#fff;font-size:14px;padding:10px 28px}.btn-publish:hover{opacity:.9}
.btn-capture{background:#546E7A;color:#fff}.btn-capture:hover{background:#455A64}


/* ── Filters ── */
.filter-bar{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);padding:16px 20px;margin-bottom:16px}
.filter-bar h3{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:12px}
.filter-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-start}
.filter-group{flex:1;min-width:180px}
.filter-group label{display:block;font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.filter-group select,.filter-group input[type=date]{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;background:#fff;outline:none}
.filter-summary{margin-top:10px;padding:8px 14px;background:#EEF3F9;border-radius:8px;font-size:11px;color:var(--primary);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.filter-tag{background:var(--primary);color:#fff;padding:2px 8px;border-radius:12px;font-size:10px}

/* ── Top Section ── */
.top-section{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.rank-list{list-style:none}
.rank-list li{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f0f2f5;font-size:12px}
.rank-list li:last-child{border:none}
.rank-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.rank-1{background:linear-gradient(135deg,#FFD700,#FFA000)}
.rank-2{background:linear-gradient(135deg,#B0BEC5,#78909C)}
.rank-3{background:linear-gradient(135deg,#CD7F32,#8D6E63)}
.rank-other{background:#CFD8DC}
.rank-name{flex:1;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-score{font-weight:700;min-width:48px;text-align:right}
.rank-score.high{color:var(--success)}.rank-score.low{color:var(--danger)}
.rank-count{color:var(--text-muted);font-size:10px;min-width:35px;text-align:right}

.today-alert{background:linear-gradient(135deg,#FFF3E0,#FFECB3);border:1px solid #FFE0B2;border-radius:var(--radius);padding:16px 20px;margin-bottom:16px}
.today-alert h3{color:#E65100;font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.alert-chips{display:flex;flex-wrap:wrap;gap:8px}
.alert-chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px}
.alert-chip.detract{background:#FFCDD2;color:#B71C1C}
.alert-chip.neutral{background:#FFF9C4;color:#F57F17}

/* ── Tabs ── */
.tab-nav{display:flex;gap:0;border-bottom:2px solid var(--border);background:var(--card);border-radius:var(--radius) var(--radius) 0 0;overflow-x:auto}
.tab-btn{padding:12px 22px;font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
.tab-btn:hover{color:var(--primary)}.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab-content{background:var(--card);border-radius:0 0 var(--radius) var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);border-top:none}
.tab-pane{display:none;padding:20px}.tab-pane.active{display:block}

/* ── Tables ── */
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{background:#F0F4F8;padding:10px 12px;text-align:center;font-weight:700;color:var(--primary);border-bottom:2px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none;position:sticky;top:0;z-index:1}
.data-table th:hover{background:#E3EAF2}
.data-table td{padding:8px 12px;border-bottom:1px solid #f0f2f5;text-align:center}
.data-table tr:hover{background:#F8FAFC}
.score-cell{font-weight:700;padding:3px 8px;border-radius:6px;display:inline-block;min-width:50px}
.score-high{background:#E8F5E9;color:#1B5E20}
.score-mid{background:#FFF8E1;color:#F57F17}
.score-low{background:#FFEBEE;color:#B71C1C}
.table-scroll{max-height:600px;overflow-y:auto}
.pagination{display:flex;align-items:center;justify-content:center;gap:4px;margin-top:16px}
.pagination button{padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;font-size:12px}
.pagination button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.pagination button:disabled{opacity:.4;cursor:default}
.search-bar{display:flex;gap:8px;margin-bottom:12px}
.search-bar input{flex:1;padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-size:12px;outline:none}

/* ── Notice / Board ── */
.notice-item{padding:14px 20px;border-bottom:1px solid #f0f2f5;display:flex;align-items:center;gap:12px;cursor:pointer}
.notice-item:hover{background:#F8FAFC}
.notice-item .no{font-weight:700;color:var(--primary);min-width:30px}
.notice-item .title{flex:1;font-weight:500}
.notice-item .date,.notice-item .views{color:var(--text-muted);font-size:11px}

/* ── MultiSelect ── */
.ms-wrap{position:relative}
.ms-trigger{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:space-between;min-height:35px}
.ms-trigger:hover{border-color:var(--primary)}
.ms-dropdown{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:50;max-height:240px;overflow-y:auto;display:none}
.ms-dropdown.open{display:block}
.ms-dropdown .ms-actions{padding:6px 10px;border-bottom:1px solid var(--border);display:flex;gap:6px}
.ms-dropdown .ms-actions button{font-size:11px;padding:3px 8px;border:1px solid var(--border);border-radius:4px;background:#fff;cursor:pointer}
.ms-dropdown .ms-actions button:hover{background:#f0f2f5}
.ms-option{padding:6px 10px;display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px}
.ms-option:hover{background:#F0F4F8}
.ms-option input{margin:0}

@media print{.header,.filter-bar,.admin-controls,.tab-nav,.btn-capture,.login-overlay{display:none!important}.tab-pane{display:block!important;page-break-inside:avoid}body{background:#fff}}
@media(max-width:900px){.top-section{grid-template-columns:1fr}.filter-row{flex-direction:column}.filter-group{min-width:100%}.login-box{width:92%;padding:32px 24px}}

/* ── Charts ── */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.chart-grid{grid-template-columns:1fr}}
.chart-card{background:#FAFBFC;border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:box-shadow .2s}
.chart-card:hover{box-shadow:0 4px 16px rgba(27,58,92,.12)}
.chart-card h4{font-size:13px;color:var(--primary);margin-bottom:8px;font-weight:700}

/* ── Analysis ── */
.analysis-card{background:#FFF8E1;border:1px solid #FFE0B2;border-radius:8px;padding:16px;margin-bottom:12px}
.analysis-card h4{font-size:14px;color:#E65100;margin-bottom:8px}
.analysis-card p{font-size:13px;line-height:1.7;color:var(--text)}
.analysis-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.analysis-table th{background:#FFF3E0;padding:8px 10px;text-align:center;font-weight:700;color:#E65100;border-bottom:2px solid #FFE0B2}
.analysis-table td{padding:7px 10px;border-bottom:1px solid #FFF3E0;text-align:center}
.highlight-bad{background:#FFEBEE;color:#B71C1C;font-weight:700;border-radius:4px;padding:2px 6px}
</style>
</head>
<body>


<!-- MAIN APP -->
<div id="mainApp" class="hidden">
  <div class="header">
    <h1>📊 서부 NPS 현황 대시보드 <span class="badge" id="headerDateRange"></span></h1>
    <div class="header-right">
      <span style="font-size:10px;color:rgba(255,255,255,.6);display:flex;gap:10px">
        <span>누적 데이터 <b id="viewTotalCount" style="color:#FFD54F">0</b>건</span>
      </span>
    </div>
  </div>
  <div class="container">
    <!-- 1. FILTERS -->
    <div id="filterSection" class="filter-bar hidden">
      <h3>🔍 필터</h3>
      <div class="filter-row">
        <div class="filter-group"><label>팀명</label><div class="ms-wrap" id="msTeam"></div></div>
        <div class="filter-group"><label>대리점명</label><div class="ms-wrap" id="msAgency"></div></div>
        <div class="filter-group"><label>매장명</label><div class="ms-wrap" id="msStore"></div></div>
        <div class="filter-group"><label>업무처리일자</label>
          <div style="display:flex;gap:4px;align-items:center">
            <input type="date" id="filterDateFrom" style="flex:1"> ~ <input type="date" id="filterDateTo" style="flex:1">
          </div>
        </div>
        <div class="filter-group"><label>구분</label><div class="ms-wrap" id="msGubun"></div></div>
      </div>
      <div id="filterSummary" class="filter-summary hidden"></div>
    </div>
    <!-- 2. TODAY ALERT -->
    <div id="todayAlert" class="today-alert hidden">
      <h3>🚨 오늘의 비추천/중립 현황 <span style="font-size:12px;font-weight:400">(최신 평가일 기준)</span> _ <span style="color:var(--danger);font-size:13px">비추천/중립 발생 사유 제출해 주세요.</span></h3>
      <div id="todayAlertChips" class="alert-chips"></div>
    </div>
    <!-- 3. TABS -->
    <div id="tabsSection" class="hidden">
      <div class="tab-nav">
        <button class="tab-btn active" data-tab="tab1">📋 대리점별 NPS현황</button>
        <button class="tab-btn" data-tab="tab2">🏪 매장별 NPS현황</button>
        <button class="tab-btn" data-tab="tab6">📈 일별 변동추이</button>
        <button class="tab-btn" data-tab="tab3">📄 상세리스트</button>
        <button class="tab-btn" data-tab="tab7">📋 마케터 To-Do</button>
        <button class="tab-btn" data-tab="tab4">📢 공지사항</button>
        <button class="tab-btn" data-tab="tab5">📝 소명 게시판</button>
      </div>
      <div class="tab-content">
        <div class="tab-pane active" id="tab1"><div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button class="btn btn-sm btn-capture" onclick="captureTab('tab1')">📷 캡쳐하기</button></div><div id="tab1Content" class="table-scroll"></div></div>
        <div class="tab-pane" id="tab2"><div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button class="btn btn-sm btn-capture" onclick="captureTab('tab2')">📷 캡쳐하기</button></div><div id="tab2Content" class="table-scroll"></div></div>
        <div class="tab-pane" id="tab3"><div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button class="btn btn-sm btn-capture" onclick="captureTab('tab3')">📷 캡쳐하기</button></div><div class="search-bar"><input type="text" id="detailSearch" placeholder="매장명, 담당자, 업무유형 등 검색..." oninput="debouncedRenderDetail()"></div><div id="tab3Content"></div><div id="tab3Pagination" class="pagination"></div></div>
        <div class="tab-pane" id="tab4"><div id="noticeAdminBtn" class="hidden" style="text-align:right;margin-bottom:12px"><button class="btn btn-sm btn-primary" onclick="showNoticeForm()">✏️ 공지 작성</button></div><div id="noticeList"></div><div id="noticeDetail" class="hidden"></div><div id="noticeForm" class="hidden"></div></div>
        <div class="tab-pane" id="tab5"><div id="boardUserForm" class="hidden"><button class="btn btn-sm btn-primary" onclick="showBoardForm()" style="margin-bottom:12px">📎 소명 제출하기</button></div><div id="boardForm" class="hidden"></div><div id="boardList"></div></div>
        <!-- TAB6: 일별 변동추이 -->
        <div class="tab-pane" id="tab6">
          <div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button class="btn btn-sm btn-capture" onclick="captureTab('tab6')">📷 캡쳐하기</button></div>
          <div class="card" style="margin-bottom:16px"><div class="card-header"><h3>📈 서광주팀 일별 NPS 변동추이</h3></div><div class="card-body"><canvas id="chartTeamDaily" height="80"></canvas></div></div>
          <div class="card"><div class="card-header"><h3>📊 대리점별 일별 NPS 변동추이</h3><span style="font-size:10px;color:var(--text-muted);margin-left:8px">(클릭하면 확대)</span><div id="agencyChartPagination" style="display:flex;gap:6px;align-items:center;margin-left:auto"></div></div><div class="card-body" id="agencyChartsArea"></div></div>
        </div>
        <!-- TAB7: 마케터 To-Do -->
        <div class="tab-pane" id="tab7">
          <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
            <button class="btn btn-sm btn-primary" onclick="downloadTodoPDF()">📄 PDF 보고서 다운로드</button>
          </div>
          <div id="tab7PrintArea">
            <div id="todoAnalysisContent"></div>
            <div id="todoListContent" class="table-scroll"></div>
          </div>
        </div>
      </div>
    </div>
    <!-- 4. 우수점 -->
    <div id="topSection" class="hidden">
      <div class="card" style="margin-bottom:16px"><div class="card-header"><h3>🏆 월 누적 NPS 우수점 현황</h3></div><div class="card-body"><div class="top-section" id="topExcellent"></div></div></div>
      <!-- 5. 부진점 -->
      <div class="card" style="margin-bottom:16px"><div class="card-header"><h3>⚠️ 월 누적 NPS 부진점 현황</h3></div><div class="card-body"><div class="top-section" id="topPoor"></div></div></div>
    </div>
  </div>
</div>

<!-- SUB DETAIL -->
<div id="subDetailOverlay" class="sub-detail-overlay hidden" onclick="if(event.target===this)closeSubDetail()">
  <div class="sub-detail-modal"><div class="card-header"><h3 id="subDetailTitle"></h3><button class="modal-close" onclick="closeSubDetail()">&times;</button></div><div class="card-body" id="subDetailBody"></div></div>
</div>

<!-- CHART POPUP -->
<div id="chartPopupOverlay" class="sub-detail-overlay hidden" onclick="if(event.target===this)closeChartPopup()">
  <div class="sub-detail-modal" style="max-width:95%;width:900px">
    <div class="card-header">
      <h3 id="chartPopupTitle"></h3>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-sm btn-capture" onclick="captureChartPopup()">📷 캡쳐하기</button>
        <button class="modal-close" onclick="closeChartPopup()">&times;</button>
      </div>
    </div>
    <div class="card-body" id="chartPopupBody" style="padding:20px">
      <canvas id="chartPopupCanvas" height="120"></canvas>
    </div>
  </div>
</div>

<script>

const S = {
  rawData: [],
  filteredData: [],
  allTeams: [],
  allAgencies: [],
  allStores: [],
  published: true,
  adminPw: 'admin1234',
  userPw: '1234',
  notices: [],
  boardItems: [],
  detailPage: 1,
  detailSort: { col: null, asc: true },
  tab1Sort: { col: null, asc: true },
  tab2Sort: { col: null, asc: true },
  viewStats: {},
};

function setSyncStatus(ok) { }

/* ═══════════════════════════════════════════
   LOGIN
   ═══════════════════════════════════════════ */
async function autoInit() {
  document.getElementById('mainApp').classList.remove('hidden');
  if (typeof NPS_RAW_DATA !== 'undefined') {
    S.rawData = NPS_RAW_DATA;
    processData();
    showDashboard();
    document.getElementById('viewTotalCount').textContent = S.rawData.length.toLocaleString();
  } else {
    alert('데이터를 찾을 수 없습니다. data.js 파일이 있는지 확인해주세요.');
  }
}
window.addEventListener('DOMContentLoaded', autoInit);

// Original login functions kept but not used for auto-flow
async function doLogin(role) { /* ... */ }


/* ═══════════════════════════════════════════
   ADMIN
   ═══════════════════════════════════════════ */
function updatePublishUI() { }

async function syncToServer() { }

/* ═══════════════════════════════════════════
   FILE UPLOAD
   ═══════════════════════════════════════════ */
function parseExcel(rows) { }

/* ═══════════════════════════════════════════
   DATA PROCESSING
   ═══════════════════════════════════════════ */
function processData() {
  S.rawData.forEach(d => {
    d._agencyCode = String(d['매장코드']).substring(0, 6);
    d._agency = String(d['대리점명'] || d['대리점'] || '').trim();
    d._store = String(d['NCSI'] || d['매장명'] || '').trim();
    d._team = String(d['팀명'] || d['센터명'] || '').trim();
    d._gubun = String(d['구분']).trim();
    d._bizType = String(d['업무유형']).trim();
    d._npsType = ['신규가입','기기변경'].includes(d._bizType) ? '판매성' : '비판매성';
    d._score = Number(d['합계']) || 0;
    const bd = String(d['업무처리일자']).replace(/\.0$/, '');
    d._bizDate = bd.length === 8 ? bd.slice(0,4)+'-'+bd.slice(4,6)+'-'+bd.slice(6,8) : String(d['처리일']||'');
    const ed = String(d['평가일자']).replace(/\.0$/, '');
    d._evalDate = ed.length === 8 ? ed.slice(0,4)+'-'+ed.slice(4,6)+'-'+ed.slice(6,8) : '';
  });
  S.allTeams = [...new Set(S.rawData.map(d => d._team).filter(Boolean))].sort();
  S.allAgencies = [...new Set(S.rawData.map(d => d._agency))].sort();
  S.allStores = [...new Set(S.rawData.map(d => d._store))].sort();
}

function getFilteredData() {
  let data = [...S.rawData];
  const tm = getMultiSelectValues('msTeam');
  if (tm.length && tm.length < S.allTeams.length) data = data.filter(d => tm.includes(d._team));
  const ag = getMultiSelectValues('msAgency'), allAg = getMultiSelectOptions('msAgency');
  if (ag.length && ag.length < allAg.length) data = data.filter(d => ag.includes(d._agency));
  const st = getMultiSelectValues('msStore'), allSt = getMultiSelectOptions('msStore');
  if (st.length && st.length < allSt.length) data = data.filter(d => st.includes(d._store));
  const g = getMultiSelectValues('msGubun');
  if (g.length && g.length < 3) data = data.filter(d => g.includes(d._gubun));
  const df = document.getElementById('filterDateFrom').value, dt = document.getElementById('filterDateTo').value;
  if (df) data = data.filter(d => d._bizDate >= df);
  if (dt) data = data.filter(d => d._bizDate <= dt);
  return data;
}

function calcNPS(items) {
  const t = items.length; if (!t) return { nps:'-', total:0, p:0, n:0, d:0 };
  const p = items.filter(d=>d._gubun==='추천').length, n = items.filter(d=>d._gubun==='중립').length, d = items.filter(x=>x._gubun==='비추천').length;
  return { nps: Math.round((p-d)/t*1000)/10, total:t, p, n, d };
}
function scoreHTML(v) { const c = v==='-'?'score-mid':v>=90?'score-high':v>=80?'score-mid':'score-low'; return `<span class="score-cell ${c}">${v}</span>`; }

/* ═══════════════════════════════════════════
   MULTI-SELECT
   ═══════════════════════════════════════════ */
function buildMultiSelect(id, opts, onChange) {
  const w = document.getElementById(id); if(!w) return; w.innerHTML='';
  const trigger = document.createElement('div'); trigger.className='ms-trigger';
  trigger.innerHTML=`<span>전체 (${opts.length})</span><span>▾</span>`;
  const dd = document.createElement('div'); dd.className='ms-dropdown';
  dd.innerHTML='<div class="ms-actions"><button onclick="msAll(this,true)">전체선택</button><button onclick="msAll(this,false)">전체해제</button></div>';
  opts.forEach(o=>{const d=document.createElement('div');d.className='ms-option';d.innerHTML=`<input type="checkbox" checked value="${o}"><span>${o}</span>`;d.querySelector('input').onchange=()=>{updMs(w);onChange?.();};dd.appendChild(d);});
  w.appendChild(trigger);w.appendChild(dd);
  trigger.onclick=e=>{e.stopPropagation();document.querySelectorAll('.ms-dropdown.open').forEach(x=>{if(x!==dd)x.classList.remove('open')});dd.classList.toggle('open');};
}
function updMs(w){const ch=w.querySelectorAll('.ms-option input'),t=ch.length,c=[...ch].filter(x=>x.checked).length;w.querySelector('.ms-trigger span').textContent=c===t?`전체 (${t})`:`${c}개 선택`;}
function getMultiSelectValues(id){const w=document.getElementById(id);return w?[...w.querySelectorAll('.ms-option input:checked')].map(c=>c.value):[];}
function getMultiSelectOptions(id){const w=document.getElementById(id);return w?[...w.querySelectorAll('.ms-option input')].map(c=>c.value):[];}
function msAll(btn,check){btn.closest('.ms-dropdown').querySelectorAll('.ms-option input').forEach(c=>c.checked=check);updMs(btn.closest('.ms-wrap'));applyFilters();}
document.addEventListener('click',()=>document.querySelectorAll('.ms-dropdown.open').forEach(d=>d.classList.remove('open')));

function renderTopSection() {
  const data=S.rawData,agMap={},stMap={};

    if(!stMap[d._store])stMap[d._store]={name:d._store,all:[],sale:[],nonsale:[]};

    rc('🏅 종합 상위10 매장',sH(st,'npsAll').slice(0,10),'npsAll',1)+rc('💼 판매성 상위10 매장',sH(st,'npsSale').slice(0,10),'npsSale',1)+rc('📞 비판매성 상위10 매장',sH(st,'npsNonsale').slice(0,10),'npsNonsale',1);

    rc('⚠️ 종합 하위10 매장',sL(st,'npsAll').slice(0,10),'npsAll',0)+rc('⚠️ 비판매성 하위10 매장',sL(st,'npsNonsale').slice(0,10),'npsNonsale',0)+'<div></div>';
  const evalDates=data.map(d=>d._evalDate).filter(Boolean).sort(),last=evalDates[evalDates.length-1];
  if(last){const neg=data.filter(d=>d._evalDate===last&&(d._gubun==='비추천'||d._gubun==='중립'));if(neg.length){document.getElementById('todayAlert').classList.remove('hidden');document.getElementById('todayAlertChips').innerHTML=neg.map(d=>{const reason=String(d['추천사유']||d._reason||'').trim()||'사유없음';return`<div class="alert-chip ${d._gubun==='비추천'?'detract':'neutral'}">${d._gubun==='비추천'?'👎':'😐'} ${d._store} (${d._gubun} / ${d._bizType} / ${reason})</div>`;}).join('');}}
}
function rc(title,items,key,isH){
  const list=items.map((it,i)=>{const nps=it[key],r=i<3?'rank-'+(i+1):'rank-other',s=isH?'high':'low',e=isH?(i<3?['🥇','🥈','🥉'][i]:'✨'):(i<3?'🔻':'▼');return`<li><span class="rank-num ${r}">${i+1}</span><span style="margin-right:2px">${e}</span><span class="rank-name" title="${it.name}">${it.name}</span><span class="rank-score ${s}">${nps.nps}</span><span class="rank-count">(${nps.total}건)</span></li>`;}).join('');
  return`<div style="min-width:0"><div style="font-size:12px;font-weight:700;color:var(--primary);margin-bottom:8px">${title}</div><ul class="rank-list">${list||'<li style="color:var(--text-muted)">데이터 없음</li>'}</ul></div>`;
}

function srt(a,b,st){
  const c=st.col;let va,vb;
  if(c==='name'){va=a.name;vb=b.name;return st.asc?va.localeCompare(vb):vb.localeCompare(va);}
  if(c==='agency'){va=a.agency||'';vb=b.agency||'';return st.asc?va.localeCompare(vb):vb.localeCompare(va);}
  const m={allNPS:'allNPS',allTotal:'allNPS',saleNPS:'saleNPS',saleTotal:'saleNPS',nonsaleNPS:'nonsaleNPS',nonsaleTotal:'nonsaleNPS'};
  const k=m[c];if(!k)return 0;
  if(c.includes('Total')){va=a[k].total;vb=b[k].total;}else{va=a[k].nps==='-'?-999:a[k].nps;vb=b[k].nps==='-'?-999:b[k].nps;}
  return st.asc?va-vb:vb-va;
}

const DC=['대리점명','매장명','구분','업무유형','합계','처리직원','처리일','추천지수','추천사유','당사신뢰도','미신뢰사유','종합의견'],PS=50;
function renderDetail(){
  let data=S.filteredData;const q=(document.getElementById('detailSearch')?.value||'').trim().toLowerCase();
  if(q)data=data.filter(d=>DC.some(c=>String(d[c]).toLowerCase().includes(q)));
  if(S.detailSort.col){data=[...data].sort((a,b)=>{const va=String(a[S.detailSort.col]||''),vb=String(b[S.detailSort.col]||''),na=Number(va),nb=Number(vb);if(!isNaN(na)&&!isNaN(nb))return S.detailSort.asc?na-nb:nb-na;return S.detailSort.asc?va.localeCompare(vb):vb.localeCompare(va);});}
  const tp=Math.max(1,Math.ceil(data.length/PS));if(S.detailPage>tp)S.detailPage=tp;
  const st=(S.detailPage-1)*PS,pd=data.slice(st,st+PS);

  DC.forEach(c=>{h+=`<th onclick="sd('${c}')" style="font-size:11px">${c}${si(c)}</th>`;});
  h+='</tr></thead><tbody>';
  pd.forEach(d=>{h+='<tr>';DC.forEach(c=>{let v=d[c]!==undefined?d[c]:'';if(c==='구분'){const cl=v==='추천'?'score-high':v==='비추천'?'score-low':'score-mid';v=`<span class="score-cell ${cl}" style="font-size:11px">${v}</span>`;}h+=`<td style="font-size:11px;${['추천사유','종합의견','미신뢰사유'].includes(c)?'text-align:left;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;':''}" title="${String(d[c]||'').replace(/"/g,'&quot;')}">${v}</td>`;});h+='</tr>';});
  h+='</tbody></table></div>';document.getElementById('tab3Content').innerHTML=h;
  let pg=`<button ${S.detailPage<=1?'disabled':''} onclick="S.detailPage=1;renderDetail()">«</button><button ${S.detailPage<=1?'disabled':''} onclick="S.detailPage--;renderDetail()">‹</button>`;
  let ps=Math.max(1,S.detailPage-3),pe=Math.min(tp,ps+6);if(pe-ps<6)ps=Math.max(1,pe-6);
  for(let p=ps;p<=pe;p++)pg+=`<button class="${p===S.detailPage?'active':''}" onclick="S.detailPage=${p};renderDetail()">${p}</button>`;

  document.getElementById('tab3Pagination').innerHTML=pg;
}

async function saveNotice(){
  const t=document.getElementById('noticeTitle').value.trim();
  const c=document.getElementById('noticeContent').value.trim();
  const fi=document.getElementById('noticeFile');
  if(!t){alert('제목을 입력하세요.');return;}

  const notice={title:t,content:c,date:new Date().toISOString().slice(0,10),views:0,fileName:'',fileData:null};

  if(fi.files.length){
    const file=fi.files[0];
    notice.fileName=file.name;
    // 파일을 base64로 변환 (npoint 용량 고려 500KB 이하만)
    if(file.size<=500*1024){
      const reader=new FileReader();
      reader.onload=async e=>{
        notice.fileData=e.target.result;
        S.notices.unshift(notice);
        showLoading('공지 저장 중...');
        try{await syncToServer();}catch(e){alert('저장 실패:'+e.message);}
        hideLoading();renderNotices();
      };
      reader.readAsDataURL(file);
      return;
    } else {
      notice.fileName=file.name+' (용량초과-미저장)';
      alert('파일 크기가 500KB를 초과하여 서버에 저장되지 않습니다.\n공지 텍스트는 정상 등록됩니다.');
    }
  }
  S.notices.unshift(notice);
  showLoading('공지 저장 중...');
  try{await syncToServer();}catch(e){alert('저장 실패:'+e.message);}
  hideLoading();renderNotices();
}
async function deleteNotice(i){if(!confirm('삭제하시겠습니까?'))return;S.notices.splice(i,1);showLoading('삭제 중...');try{await syncToServer();}catch(e){}hideLoading();renderNotices();}

  S.boardItems.forEach((b,i)=>{

function downloadBoardFile(idx){

  a.href=b.fileData;
  a.download=b.fileName||'소명파일';
  document.body.appendChild(a);

function showBoardForm(){
  document.getElementById('boardForm').classList.remove('hidden');

  updBoardStores();
}
function updBoardStores(){const ag=document.getElementById('boardAgency').value;document.getElementById('boardStore').innerHTML=[...new Set(S.rawData.filter(d=>d._agency===ag).map(d=>d._store))].sort().map(s=>`<option>${s}</option>`).join('');}
async function submitBoard(){
  const ag=document.getElementById('boardAgency').value,st=document.getElementById('boardStore').value,fi=document.getElementById('boardFile');
  if(!ag||!st){alert('대리점과 매장을 선택하세요.');return;}
  const item={agency:ag,store:st,date:new Date().toISOString().slice(0,10),fileName:'',fileData:null};
  if(fi.files.length){
    const file=fi.files[0];
    item.fileName=file.name;
    if(file.size>500*1024){
      alert('파일 크기가 500KB를 초과합니다.\n파일명만 기록되고 파일은 서버에 저장되지 않습니다.');
      item.fileData=null;
      S.boardItems.unshift(item);
      showLoading('소명 제출 중...');try{await syncToServer();}catch(e){alert('실패:'+e.message);}hideLoading();renderBoard();document.getElementById('boardForm').classList.add('hidden');alert('소명이 제출되었습니다 (파일 미저장).');
      return;
    }
    // base64로 읽기
    const reader=new FileReader();
    reader.onload=async e=>{
      item.fileData=e.target.result;
      S.boardItems.unshift(item);
      showLoading('소명 제출 중...');
      try{await syncToServer();}catch(err){alert('실패:'+err.message);}
      hideLoading();renderBoard();document.getElementById('boardForm').classList.add('hidden');alert('소명이 제출되었습니다.');
    };
    reader.readAsDataURL(file);
    return;
  }
  // 파일 없이 제출
  S.boardItems.unshift(item);
  showLoading('소명 제출 중...');try{await syncToServer();}catch(e){alert('실패:'+e.message);}hideLoading();renderBoard();document.getElementById('boardForm').classList.add('hidden');alert('소명이 제출되었습니다 (파일 미첨부).');
}

let _teamChart=null;
let _agencyCharts=[];
let _agencyChartPage=0;
const AGENCY_PER_PAGE=4;

function renderTab6(){
  renderTeamDailyChart();
  renderAgencyDailyCharts();
}

function renderTeamDailyChart(){
  const data=S.filteredData;
  const dateMap={};
  data.forEach(d=>{
    const dt=d._bizDate;if(!dt)return;
    if(!dateMap[dt])dateMap[dt]={all:[],sale:[],nonsale:[]};
    dateMap[dt].all.push(d);
    (d._npsType==='판매성'?dateMap[dt].sale:dateMap[dt].nonsale).push(d);
  });
  const dates=Object.keys(dateMap).sort();
  const allNPS=dates.map(dt=>calcNPS(dateMap[dt].all).nps==='-'?null:calcNPS(dateMap[dt].all).nps);
  const saleNPS=dates.map(dt=>calcNPS(dateMap[dt].sale).nps==='-'?null:calcNPS(dateMap[dt].sale).nps);
  const nonsaleNPS=dates.map(dt=>calcNPS(dateMap[dt].nonsale).nps==='-'?null:calcNPS(dateMap[dt].nonsale).nps);
  const labels=dates.map(d=>d.slice(5));

  if(_teamChart){_teamChart.destroy();}
  const ctx=document.getElementById('chartTeamDaily');
  if(!ctx)return;
  _teamChart=new Chart(ctx,{
    type:'line',
    data:{
      labels,
      datasets:[
        {label:'종합NPS',data:allNPS,borderColor:'#1B3A5C',backgroundColor:'rgba(27,58,92,.1)',tension:.3,pointRadius:4,borderWidth:2.5},
        {label:'판매성NPS',data:saleNPS,borderColor:'#1A8A4A',backgroundColor:'rgba(26,138,74,.1)',tension:.3,pointRadius:4,borderWidth:2},
        {label:'비판매성NPS',data:nonsaleNPS,borderColor:'#E8531E',backgroundColor:'rgba(232,83,30,.1)',tension:.3,pointRadius:4,borderWidth:2},
      ]
    },
    options:{responsive:true,plugins:{legend:{position:'top',labels:{font:{size:12}}},tooltip:{mode:'index',intersect:false}},scales:{y:{min:50,max:105,ticks:{callback:v=>v+'점'}},x:{ticks:{font:{size:11}}}}}
  });
}

function renderAgencyDailyCharts(){
  const area=document.getElementById('agencyChartsArea');
  const pgArea=document.getElementById('agencyChartPagination');
  if(!area)return;

  const agSel=getMultiSelectValues('msAgency');
  let agencies;
  if(agSel.length&&agSel.length<S.allAgencies.length){agencies=agSel.sort();}
  else{agencies=[...S.allAgencies].sort();}

  const totalPages=Math.max(1,Math.ceil(agencies.length/AGENCY_PER_PAGE));
  if(_agencyChartPage>=totalPages)_agencyChartPage=totalPages-1;
  const startIdx=_agencyChartPage*AGENCY_PER_PAGE;
  const pageAgencies=agencies.slice(startIdx,startIdx+AGENCY_PER_PAGE);

  let pgHTML=`<span style="font-size:11px;color:var(--text-muted)">${agencies.length}개 대리점 (${_agencyChartPage+1}/${totalPages})</span>`;
  pgHTML+=`<button class="btn btn-sm btn-outline" ${_agencyChartPage<=0?'disabled':''} onclick="_agencyChartPage--;renderAgencyDailyCharts()">◀ 이전</button>`;
  pgHTML+=`<button class="btn btn-sm btn-outline" ${_agencyChartPage>=totalPages-1?'disabled':''} onclick="_agencyChartPage++;renderAgencyDailyCharts()">다음 ▶</button>`;
  pgArea.innerHTML=pgHTML;

  _agencyCharts.forEach(c=>c.destroy());
  _agencyCharts=[];

  let html='<div class="chart-grid">';
  pageAgencies.forEach((ag,i)=>{
    html+=`<div class="chart-card" onclick="openChartPopup('${ag.replace(/'/g,"\\'")}')"><h4>${ag} <span style="font-size:10px;color:var(--text-muted);font-weight:400">🔍 클릭하여 확대</span></h4><canvas id="agChart${i}" height="70"></canvas></div>`;
  });
  html+='</div>';
  area.innerHTML=html;

  pageAgencies.forEach((ag,i)=>{
    const chartObj=buildAgencyChartOnCanvas('agChart'+i,ag,S.filteredData,{legendSize:10,pointR:3,borderW:1.5,yMin:40});
    if(chartObj)_agencyCharts.push(chartObj);
  });

  // 관리자 전용: 부진 대리점
  if(S.role==='admin') renderWeakAgencyCharts();
}

// 대리점 차트 빌드 공용 함수
function buildAgencyChartOnCanvas(canvasId,agencyName,dataSource,opts){
  const agData=dataSource.filter(d=>d._agency===agencyName);
  const dateMap={};
  agData.forEach(d=>{
    const dt=d._bizDate;if(!dt)return;
    if(!dateMap[dt])dateMap[dt]={all:[],sale:[],nonsale:[]};
    dateMap[dt].all.push(d);
    (d._npsType==='판매성'?dateMap[dt].sale:dateMap[dt].nonsale).push(d);
  });
  const dates=Object.keys(dateMap).sort();
  if(!dates.length)return null;
  const labels=dates.map(d=>d.slice(5));
  const el=document.getElementById(canvasId);
  if(!el)return null;
  return new Chart(el,{
    type:'line',
    data:{
      labels,
      datasets:[
        {label:'종합',data:dates.map(dt=>{const n=calcNPS(dateMap[dt].all);return n.nps==='-'?null:n.nps;}),borderColor:'#1B3A5C',backgroundColor:'rgba(27,58,92,.08)',fill:true,tension:.3,pointRadius:opts.pointR||3,borderWidth:opts.borderW||2},
        {label:'판매성',data:dates.map(dt=>{const n=calcNPS(dateMap[dt].sale);return n.nps==='-'?null:n.nps;}),borderColor:'#1A8A4A',tension:.3,pointRadius:opts.pointR||3,borderWidth:(opts.borderW||2)*0.8},
        {label:'비판매성',data:dates.map(dt=>{const n=calcNPS(dateMap[dt].nonsale);return n.nps==='-'?null:n.nps;}),borderColor:'#E8531E',tension:.3,pointRadius:opts.pointR||3,borderWidth:(opts.borderW||2)*0.8},
      ]
    },
    options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:true,labels:{font:{size:opts.legendSize||12},boxWidth:14}},tooltip:{mode:'index',intersect:false}},scales:{y:{min:opts.yMin||40,max:105,ticks:{font:{size:opts.tickSize||11},callback:v=>v+'점'}},x:{ticks:{font:{size:opts.tickSize||10}}}}}
  });
}

// 관리자 전용: 최근 1주일 팀 평균 미만 대리점
let _weakCharts=[];
function renderWeakAgencyCharts(){
  const section=document.getElementById('weakAgencySection');
  const area=document.getElementById('weakAgencyChartsArea');
  if(!section||!area)return;

  _weakCharts.forEach(c=>c.destroy());
  _weakCharts=[];

  // 최근 1주일 날짜 계산
  const allDates=S.rawData.map(d=>d._bizDate).filter(Boolean).sort();
  const lastDate=allDates[allDates.length-1];
  if(!lastDate){section.classList.add('hidden');return;}
  const lastDt=new Date(lastDate);
  const weekAgo=new Date(lastDt);weekAgo.setDate(weekAgo.getDate()-6);
  const weekAgoStr=weekAgo.toISOString().slice(0,10);

  const tmSel = getMultiSelectValues('msTeam');
  const recentData=S.rawData.filter(d=>d._bizDate>=weekAgoStr&&d._bizDate<=lastDate);
  const filteredRecent = (tmSel.length && tmSel.length < S.allTeams.length) ? recentData.filter(d => tmSel.includes(d._team)) : recentData;
  if(!filteredRecent.length){section.classList.add('hidden');return;}

  // 팀 평균 종합NPS
  const teamNPS=calcNPS(filteredRecent);
  if(teamNPS.nps==='-'){section.classList.add('hidden');return;}

  // 대리점별 종합NPS
  const agMap={};
  filteredRecent.forEach(d=>{
    if(!agMap[d._agency])agMap[d._agency]=[];
    agMap[d._agency].push(d);
  });

  const weakAgencies=[];
  Object.entries(agMap).forEach(([name,items])=>{
    const nps=calcNPS(items);
    if(nps.nps!=='-'&&nps.nps<teamNPS.nps) weakAgencies.push({name,nps:nps.nps,total:nps.total});
  });
  weakAgencies.sort((a,b)=>a.nps-b.nps);

  if(!weakAgencies.length){section.classList.add('hidden');return;}

  section.classList.remove('hidden');
  let html=`<div style="font-size:12px;color:var(--text-secondary);margin-bottom:12px">최근 1주일(${weekAgoStr}~${lastDate}) 선택 팀 평균 종합NPS <b style="color:var(--primary)">${teamNPS.nps}점</b> 미만 대리점 <b style="color:var(--danger)">${weakAgencies.length}개</b></div>`;
  html+='<div class="chart-grid">';
  weakAgencies.forEach((ag,i)=>{
    html+=`<div class="chart-card" onclick="openChartPopup('${ag.name.replace(/'/g,"\\'")}')"><h4 style="color:var(--danger)">${ag.name} <span style="font-size:11px;font-weight:400">(${ag.nps}점, 평균 대비 ${(ag.nps-teamNPS.nps).toFixed(1)})</span> <span style="font-size:10px;color:var(--text-muted)">🔍 클릭확대</span></h4><canvas id="weakAgChart${i}" height="70"></canvas></div>`;
  });

  area.innerHTML=html;

  weakAgencies.forEach((ag,i)=>{
    const c=buildAgencyChartOnCanvas('weakAgChart'+i,ag.name,S.rawData,{legendSize:10,pointR:3,borderW:1.5,yMin:40});
    if(c)_weakCharts.push(c);
  });

/* ═══════════════════════════════════════════
   TAB7: 마케터 To-Do (관리자 전용)
   ═══════════════════════════════════════════ */
function renderTab7(){
  renderTodoList();
  renderTodoAnalysis();
}

function renderTodoList(){
  const neg=S.filteredData.filter(d=>d._gubun==='비추천'||d._gubun==='중립');
  neg.sort((a,b)=>(b._evalDate||'').localeCompare(a._evalDate||''));
  let h=`<table class="data-table"><thead><tr><th>구분</th><th>매장명</th><th>대리점명</th><th>평가일자</th><th>업무유형</th><th>합계</th><th>추천사유</th></tr></thead><tbody>`;
  neg.forEach(d=>{
    const cls=d._gubun==='비추천'?'score-low':'score-mid';
    const reason=String(d['추천사유']||'').trim()||'-';
    h+=`<tr><td><span class="score-cell ${cls}" style="font-size:11px">${d._gubun}</span></td><td style="text-align:left;font-weight:600">${d._store}</td><td style="text-align:left">${d._agency}</td><td>${d._evalDate}</td><td>${d._bizType}</td><td>${d._score}</td><td style="text-align:left;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${reason}">${reason}</td></tr>`;
  });
  h+='</tbody></table>';
  h=`<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">총 ${neg.length}건</div>`+h;
  document.getElementById('todoListContent').innerHTML=h;
}

function renderTodoAnalysis(){
  const el=document.getElementById('todoAnalysisContent');
  if(!el)return;
  const allData=S.filteredData;
  const neg=allData.filter(d=>d._gubun==='비추천'||d._gubun==='중립');

  // 매장별 비추천/중립 건수
  const storeMap={};
  neg.forEach(d=>{
    if(!storeMap[d._store])storeMap[d._store]={name:d._store,agency:d._agency,count:0,det:0,neu:0,bizTypes:{}};
    storeMap[d._store].count++;
    if(d._gubun==='비추천')storeMap[d._store].det++;else storeMap[d._store].neu++;
    if(!storeMap[d._store].bizTypes[d._bizType])storeMap[d._store].bizTypes[d._bizType]=0;
    storeMap[d._store].bizTypes[d._bizType]++;
  });
  const storeArr=Object.values(storeMap).sort((a,b)=>b.count-a.count);

  // 서광주팀 전체 평균
  const totalStores=[...new Set(allData.map(d=>d._store))].length;
  const avgNeg=neg.length/Math.max(totalStores,1);
  const teamNPS=calcNPS(allData);

  // 상위 문제 매장 (2건 이상)
  const problemStores=storeArr.filter(s=>s.count>=2);

  let html='';

  // 종합 요약
  html+=`<div class="analysis-card"><h4>📊 서광주팀 종합 현황</h4><p>
    전체 응답 <b>${allData.length}건</b> 중 비추천 <b style="color:var(--danger)">${neg.filter(d=>d._gubun==='비추천').length}건</b>, 중립 <b style="color:var(--warning)">${neg.filter(d=>d._gubun==='중립').length}건</b> 발생<br>
    서광주팀 종합 NPS: <b>${teamNPS.nps}점</b> | 매장당 평균 비추천+중립: <b>${avgNeg.toFixed(1)}건</b><br>
    문제 매장(2건 이상): <b style="color:var(--danger)">${problemStores.length}개</b>
  </p></div>`;

  // 문제 매장 상세
  if(problemStores.length){
    html+=`<div class="analysis-card"><h4>⚠️ 집중 관리 필요 매장 (비추천+중립 2건 이상)</h4>`;
    html+=`<table class="analysis-table"><thead><tr><th>순위</th><th>매장명</th><th>대리점</th><th>비추천</th><th>중립</th><th>합계</th><th>평균 대비</th><th>취약 업무유형</th></tr></thead><tbody>`;
    problemStores.forEach((s,i)=>{
      const diff=s.count-avgNeg;
      const weakBiz=Object.entries(s.bizTypes).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`${k}(${v}건)`).join(', ');
      // 해당 매장 NPS
      const storeData=allData.filter(d=>d._store===s.name);
      const storeNPS=calcNPS(storeData);
      html+=`<tr><td><b>${i+1}</b></td><td style="text-align:left;font-weight:600">${s.name}</td><td style="text-align:left">${s.agency}</td>
        <td><span class="highlight-bad">${s.det}</span></td><td>${s.neu}</td><td><b>${s.count}</b></td>
        <td style="color:var(--danger);font-weight:700">+${diff.toFixed(1)}건</td>
        <td style="text-align:left;font-size:11px">${weakBiz}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  }

  // 업무유형별 비추천 분석
  const bizMap={};
  neg.forEach(d=>{if(!bizMap[d._bizType])bizMap[d._bizType]={name:d._bizType,det:0,neu:0,total:0};bizMap[d._bizType].total++;if(d._gubun==='비추천')bizMap[d._bizType].det++;else bizMap[d._bizType].neu++;});
  const bizArr=Object.values(bizMap).sort((a,b)=>b.total-a.total);

  html+=`<div class="analysis-card"><h4>📋 업무유형별 비추천/중립 현황</h4>`;
  html+=`<table class="analysis-table"><thead><tr><th>업무유형</th><th>비추천</th><th>중립</th><th>합계</th><th>비율</th></tr></thead><tbody>`;
  bizArr.forEach(b=>{
    const pct=(b.total/neg.length*100).toFixed(1);
    html+=`<tr><td>${b.name}</td><td>${b.det}</td><td>${b.neu}</td><td><b>${b.total}</b></td><td>${pct}%</td></tr>`;
  });
  html+=`</tbody></table></div>`;

  // 마케터 조치 제안
  html+=`<div class="analysis-card" style="background:#E8F5E9;border-color:#C8E6C9"><h4>💡 마케터 조치 제안</h4><p>`;
  if(problemStores.length){
    html+=`<b>우선 방문 대상:</b> ${problemStores.slice(0,5).map(s=>s.name).join(', ')}<br>`;
    const topBiz=bizArr[0];
    if(topBiz)html+=`<b>가장 취약한 업무유형:</b> ${topBiz.name} (${topBiz.total}건) — 해당 업무 처리 프로세스 점검 권장<br>`;
    html+=`<b>조치:</b> 상위 문제 매장에 대해 현장 방문 또는 유선 코칭을 통해 비추천/중립 발생 원인을 파악하고, 취약 업무유형에 대한 응대 교육을 실시하세요.`;
  }else{
    html+=`현재 비추천/중립 2건 이상 매장이 없습니다. 양호한 상태입니다!`;
  }
  html+=`</p></div>`;

  el.innerHTML=html;
}

/* ═══════════════════════════════════════════
   PDF DOWNLOAD: 마케터 To-Do 보고서
   html2canvas → jsPDF A4 페이지 분할
   ═══════════════════════════════════════════ */
async function downloadTodoPDF(){
  const area=document.getElementById('tab7PrintArea');
  if(!area){alert('보고서 영역을 찾을 수 없습니다.');return;}

  showLoading('PDF 보고서 생성 중...');

  // table-scroll max-height 임시 해제
  const scrollEls=area.querySelectorAll('.table-scroll');
  const origStyles=[];
  scrollEls.forEach(s=>{origStyles.push(s.style.maxHeight);s.style.maxHeight='none';});

  try{
    // A4 비율: 210mm x 297mm
    const A4_W=210, A4_H=297;
    const MARGIN=10;
    const CONTENT_W=A4_W-MARGIN*2;
    const CONTENT_H=A4_H-MARGIN*2;

    const canvas=await html2canvas(area,{
      scale:2,
      backgroundColor:'#ffffff',
      useCORS:true,
      scrollX:0,scrollY:0,
      width:area.scrollWidth,
      height:area.scrollHeight,
      windowWidth:area.scrollWidth
    });

    const imgW=canvas.width;
    const imgH=canvas.height;

    // jsPDF 로드 확인
    const jsPDFClass = (window.jspdf && window.jspdf.jsPDF) || (window.jsPDF) || null;
    if(!jsPDFClass){
      // 폴백: 이미지로 저장
      const link=document.createElement('a');
      link.download=`마케터ToDo_보고서_${new Date().toISOString().slice(0,10)}.jpg`;
      link.href=canvas.toDataURL('image/jpeg',0.95);
      link.click();
      alert('PDF 라이브러리 로드 실패로 이미지(JPG)로 저장되었습니다.');
      return;
    }

    const pdf=new jsPDFClass('p','mm','a4');

    // 이미지를 A4 콘텐츠 너비에 맞추고, 높이는 비율 유지
    const pdfImgW=CONTENT_W;
    const pdfImgH=(imgH/imgW)*pdfImgW;

    // 전체 이미지를 페이지별로 잘라서 삽입
    const totalPages=Math.ceil(pdfImgH/CONTENT_H);

    for(let page=0;page<totalPages;page++){
      if(page>0) pdf.addPage();

      // 헤더
      pdf.setFontSize(8);
      pdf.setTextColor(150);
      pdf.text(`서광주팀 마케터 To-Do 보고서 | ${new Date().toISOString().slice(0,10)} | ${page+1}/${totalPages}`,MARGIN,MARGIN-2);

      // 이미지를 위로 밀어서 현재 페이지 영역만 보이게
      const srcY=page*CONTENT_H;
      const remainH=Math.min(CONTENT_H,pdfImgH-srcY);

      // 소스 이미지에서 현재 페이지에 해당하는 부분만 잘라내기
      const sliceCanvas=document.createElement('canvas');
      const srcPixelY=Math.round((srcY/pdfImgH)*imgH);
      const srcPixelH=Math.round((remainH/pdfImgH)*imgH);
      sliceCanvas.width=imgW;
      sliceCanvas.height=srcPixelH;
      const sCtx=sliceCanvas.getContext('2d');
      sCtx.drawImage(canvas,0,srcPixelY,imgW,srcPixelH,0,0,imgW,srcPixelH);
      const sliceData=sliceCanvas.toDataURL('image/jpeg',0.92);

      const sliceImgH=(srcPixelH/imgW)*pdfImgW;
      pdf.addImage(sliceData,'JPEG',MARGIN,MARGIN,pdfImgW,sliceImgH);
    }

    pdf.save(`마케터ToDo_보고서_${new Date().toISOString().slice(0,10)}.pdf`);
  }catch(e){
    alert('PDF 생성 오류: '+e.message);
  }finally{
    scrollEls.forEach((s,i)=>{s.style.maxHeight=origStyles[i];});
    hideLoading();
  }
}

/* ═══════════════════════════════════════════
   PWA: 서비스워커 등록 + 업데이트 감지
   ═══════════════════════════════════════════ */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    console.log('SW registered');
    // 새 버전 감지
    reg.addEventListener('updatefound', () => {
      const newWorker = reg.installing;
      newWorker.addEventListener('statechange', () => {
        if (newWorker.state === 'activated') {
          document.getElementById('updateBanner').classList.remove('hidden');
        }
      });
    });
  }).catch(err => console.log('SW registration failed:', err));
}

/* ═══════════════════════════════════════════
   PWA: 데이터 업데이트 알림 (배포 시각 비교)
   ═══════════════════════════════════════════ */
let _lastUpdatedAt = localStorage.getItem('nps_lastUpdatedAt') || '';

async function checkForUpdates() {
  try {
    const data = await CLOUD.read();
    const serverUpdated = data.updatedAt || '';
    if (_lastUpdatedAt && serverUpdated && serverUpdated !== _lastUpdatedAt) {
      // 새 배포 감지!
      document.getElementById('updateBanner').classList.remove('hidden');
    }
    _lastUpdatedAt = serverUpdated;
    localStorage.setItem('nps_lastUpdatedAt', serverUpdated);
  } catch(e) { /* 무시 */ }
}

// 로그인 후 주기적으로 업데이트 체크 (60초마다)
const _origInitApp = initApp;
initApp = function() {
  _origInitApp();
  // 최초 저장
  localStorage.setItem('nps_lastUpdatedAt', _lastUpdatedAt);
  // 60초마다 체크
  setInterval(checkForUpdates, 60000);
};

/* ═══════════════════════════════════════════
   PWA: 앱 설치 프롬프트
   ═══════════════════════════════════════════ */
let _deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredPrompt = e;
  // 이미 설치한 적 있으면 표시 안 함
  if (!localStorage.getItem('nps_installDismissed')) {
    document.getElementById('installPrompt').classList.remove('hidden');
  }
});

function installPWA() {
  if (!_deferredPrompt) return;
  _deferredPrompt.prompt();
  _deferredPrompt.userChoice.then(result => {
    if (result.outcome === 'accepted') {
      console.log('PWA installed');
    }
    _deferredPrompt = null;
    document.getElementById('installPrompt').classList.add('hidden');
  });
}

function dismissInstall() {
  document.getElementById('installPrompt').classList.add('hidden');
  localStorage.setItem('nps_installDismissed', '1');
}

// 이미 설치된 앱인 경우 감지
window.addEventListener('appinstalled', () => {
  document.getElementById('installPrompt').classList.add('hidden');
  console.log('PWA installed successfully');
});
</script>
